# MyBatis-Plus配置
mybatis-plus:
  # Mapper的xml文件路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: org.example.ev_charge_server.entity
  configuration:
    # 开启驼峰命名自动转换（比如数据库的charging_order 对应实体的chargingOrder）
    map-underscore-to-camel-case: true
    # 打印SQL日志，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.ev_charge_server
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
